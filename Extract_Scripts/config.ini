[settings]

# MO2 mode only: which plugins to process.
#   enabled = only the active load order (Morrowind.ini [Game Files]) -- what the
#             game actually loads. Disabled plugins sitting in Data Files are skipped.
#   all     = every plugin MO2 lists (loadorder.txt), enabled or not.
plugins = enabled

# What to extract from each plugin.
include_scripts = true
include_globals = true

# Parallel workers (tes3conv runs once per plugin). -1 = one per CPU core.
workers = -1
