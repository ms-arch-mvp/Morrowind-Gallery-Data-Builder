[settings]

# Top-level folders to compare, comma-separated.
subfolders = meshes, textures

# true  = treat same-size files as unchanged (faster, skips hashing)
# false = also hash same-size files so content edits are caught (slower, exact)
quick = false

# Parallel workers for hashing. -1 = one per CPU core.
workers = -1

# Outputs a flagged_meshes.txt listing.
flagged_meshes = true
