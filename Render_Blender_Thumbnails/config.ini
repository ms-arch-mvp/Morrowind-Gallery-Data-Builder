[settings]

# (Blender's path lives in ..\Shared\paths.ini -- shared with the other Blender tools.)

# Run oxipng (in the repo's Shared folder) to compress the PNGs.
run_oxipng = true

# Parallel workers. -1 = one per CPU core (that many Blender instances at once --
# lower it if you run short on RAM).
workers = 8

# Output format (PNG or TGA) and resolution.
format = PNG
resolution = 1024

# Output options.
lowercase_output = true
flat_output = false
force_blend_only = false

# Rendering.
global_rotation = 0
render_only_rotation_exceptions = false
render_vertex_normals = false
cull_backfaces = true
auto_set_emissive_color = true
emissive_exceptions = ray

# Input classification (comma-separated folder names under the input tree).
subfolder_filter =
body_part_folders = b
creature_folders = cr, r, wolf
npc_folders = npc
hair_exceptions = _hair, _hr_

# NIF import (only affects .nif sources).
nif_use_existing_materials = true
nif_ignore_collision_nodes = true
nif_ignore_animations = false
nif_ignore_armatures = false
nif_ignore_billboard_nodes = true
nif_ignore_emissive_color = false
nif_ignore_tri_shadow = true
nif_ignore_nodes = Lightning
nif_ignore_nodes_under_switches = OFF, HARVESTED, Closed
nif_filter_best_lod = true
