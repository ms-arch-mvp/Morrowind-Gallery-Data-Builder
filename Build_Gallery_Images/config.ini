[settings]

# (IrfanView's path lives in ..\Shared\paths.ini. Falls back to 32-bit i_view32.exe.)

# Pixel size for each of the two output profiles.
renders_size    = 1024
thumbnails_size = 256

# WebP encoding.
quality  = 75
method   = 4
passes   = 1
lossless = 0

# Parallel workers. -1 = one per CPU core.
workers = -1
