[settings]

# (Blender's path lives in ..\Shared\paths.ini -- shared with the other Blender tools.)

# MO2 mode only: which plugins to process.
#   enabled = only the active load order (Morrowind.ini [Game Files]).
#   all     = every plugin MO2 lists (loadorder.txt), enabled or not.
plugins = enabled

# Replay "Let There Be Darkness" runtime light overrides (colour + radius) onto
# light records, matching what the in-game export captures. auto = apply if the
# mod is enabled; false = never.
apply_ltbd = auto

# Parallel workers (tes3conv runs once per plugin). -1 = one per CPU core.
workers = -1

# Layout of the output master structure.json:
#   minified = single line, smallest file, fastest to load (what the pipeline uses).
#   pretty   = indented and multi-line, easier to read/diff by hand (larger file).
json_format = minified
