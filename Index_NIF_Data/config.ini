[settings]

# (Blender's path lives in ..\Shared\paths.ini -- shared with the other Blender tools.)

# Parallel workers. -1 = one per CPU core.
workers = -1

# Only index meshes containing these block types (comma-separated). Blank = all.
node_filter =

# Also copies the matching .nif files to output\extracted.
extract = false

# Outputs a flagged_meshes.txt listing.
flagged_meshes = false
